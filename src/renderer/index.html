<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/desktop-ui.css">
    <title>Plotop - Clients</title>
    <style>
        body {
            padding-top: var(--toolbar-height);
        }

        .container {
            padding: 16px 20px;
        }

        .toolbar-title {
            display: flex;
            flex-direction: column;
            line-height: 1.3;
        }

        .toolbar-title .subtitle {
            font-size: 12px;
            font-weight: normal;
            color: var(--text-secondary);
        }

        .empty-hint {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-secondary);
        }

        .empty-hint h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .empty-hint p {
            margin: 6px 0;
        }

        .empty-hint code {
            display: inline-block;
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: var(--border-radius);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: var(--accent-color);
            margin: 10px 0;
            font-size: 13px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.online {
            background-color: #2e7d32;
        }

        .status-dot.offline {
            background-color: #9e9e9e;
        }

        .ip-text {
            flex: 1;
            font-size: 14px;
        }

        .ip-arrow {
            color: var(--text-secondary);
            font-size: 18px;
            line-height: 1;
        }
    </style>
    <script src="/vendor/socket.io.js"></script>
    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", function () {
            var params = new URLSearchParams(window.location.search);
            var ipParam = params.get('ip');
            if (ipParam) {
                window.location.href = '/plot?ip=' + encodeURIComponent(ipParam);
                return;
            }

            var socket = io.connect('/');
            var displayedIps = new Set();

            function hideEmptyHint() {
                var emptyHint = document.getElementById("emptyHint");
                if (emptyHint) {
                    emptyHint.style.display = "none";
                }
            }

            function createIpItem(ip, alive) {
                var item = document.createElement("div");
                item.className = "app-list-item";
                item.onclick = function () {
                    window.location.href = '/plot?ip=' + encodeURIComponent(ip);
                };

                var dot = document.createElement("span");
                dot.className = "status-dot " + (alive ? "online" : "offline");

                var text = document.createElement("span");
                text.className = "ip-text";
                text.innerHTML = ip;

                var arrow = document.createElement("span");
                arrow.className = "ip-arrow";
                arrow.innerHTML = "›";

                item.appendChild(dot);
                item.appendChild(text);
                item.appendChild(arrow);
                return item;
            }

            function updateIpItem(ip, alive) {
                var items = document.getElementsByClassName("app-list-item");
                for (var i = 0; i < items.length; i++) {
                    var text = items[i].querySelector(".ip-text");
                    if (text && text.innerHTML === ip) {
                        var dot = items[i].querySelector(".status-dot");
                        if (dot) {
                            dot.className = "status-dot " + (alive ? "online" : "offline");
                        }
                        return;
                    }
                }
            }

            socket.on('new_ip', function (data) {
                hideEmptyHint();
                var ip = data.ip;
                if (!ip) return;
                if (displayedIps.has(ip)) {
                    updateIpItem(ip, data.alive);
                } else {
                    displayedIps.add(ip);
                    var ipList = document.getElementById("ipList");
                    if (ipList) {
                        ipList.appendChild(createIpItem(ip, data.alive));
                    }
                }
            });

            var tcpPortInput = document.getElementById("tcpPortInput");
            var tcpPortStatus = document.getElementById("tcpPortStatus");
            var clientCommandEl = document.getElementById("clientCommand");

            function updateClientCommand(port) {
                if (clientCommandEl) {
                    clientCommandEl.textContent = './plotop -i <server_ip> -p ' + port + ' -d 1';
                }
            }

            socket.emit('config:get_tcp_port');
            socket.on('config:tcp_port', function (port) {
                if (tcpPortInput) {
                    tcpPortInput.value = port;
                }
                updateClientCommand(port);
                if (tcpPortStatus) {
                    tcpPortStatus.textContent = '当前 TCP 端口: ' + port;
                }
            });

            var applyTcpPortBtn = document.getElementById("applyTcpPort");
            if (applyTcpPortBtn) {
                applyTcpPortBtn.addEventListener('click', function () {
                    var newPort = parseInt(tcpPortInput.value, 10);
                    if (!newPort || newPort < 1 || newPort > 65535) {
                        if (tcpPortStatus) tcpPortStatus.textContent = '请输入 1-65535 之间的端口';
                        return;
                    }
                    socket.emit('config:set_tcp_port', { port: newPort });
                    if (tcpPortStatus) tcpPortStatus.textContent = '切换中...';
                });
            }
        });
    </script>
</head>

<body>
    <div class="app-toolbar">
        <div class="toolbar-title">
            <span>Plotop Clients</span>
            <span class="subtitle">已连接的客户端列表，点击 IP 查看实时性能数据</span>
        </div>
        <div class="app-toolbar-group">
            <label for="tcpPortInput">TCP 端口</label>
            <input id="tcpPortInput" class="app-input" type="number" min="1" max="65535" value="28081" style="width: 70px;" />
            <button id="applyTcpPort" class="app-button primary">应用</button>
        </div>
        <div class="app-status-bar" id="tcpPortStatus">当前 TCP 端口: 28081</div>
    </div>
    <div class="container">
        <div id="emptyHint" class="empty-hint">
            <h3>暂无客户端连接 / No clients connected</h3>
            <p>请先启动 plotop client，将性能数据发送到本服务端：</p>
            <code id="clientCommand">./plotop -i &lt;server_ip&gt; -p 28081 -d 1</code>
            <p class="hint-detail">更多用法请参考 README.md</p>
        </div>
        <div id="ipList" class="app-list"></div>
    </div>
</body>

</html>
